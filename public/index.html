<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch — Support Orchestration POC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #07080A;
      --surface:       #0F1117;
      --surface-2:     #14161E;
      --border:        rgba(255,255,255,0.07);
      --border-hover:  rgba(255,255,255,0.12);
      --text:          #EEEEF0;
      --text-muted:    #4E5260;
      --accent:        #F59E0B;
      --accent-soft:   rgba(245,158,11,0.12);
      --accent-border: rgba(245,158,11,0.35);
      --accent-glow:   0 0 20px rgba(245,158,11,0.3), 0 0 45px rgba(245,158,11,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── particle canvas ──────────────────────────────────────── */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    header, .dispatch-hub, .status-bar, .chat-container {
      position: relative;
      z-index: 1;
    }

    /* ── header ───────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #FFFFFF 0%, rgba(245,158,11,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }

    /* ── dispatch hub ─────────────────────────────────────────── */
    .dispatch-hub {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 680px;
      margin-bottom: 14px;
    }

    /* SVG for signal lines — stretched over full hub */
    .signal-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }

    /* ── orchestrator node ────────────────────────────────────── */
    .orchestrator-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    .orch-wrapper {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .orch-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(245,158,11,0.35);
      animation: orchRingPulse 2.4s ease-out infinite;
      pointer-events: none;
    }

    .orch-ring:nth-child(2) { animation-delay: 1.1s; }

    @keyframes orchRingPulse {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    .orch-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--accent-glow);
      color: var(--accent);
      z-index: 1;
    }

    .orch-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: rgba(245,158,11,0.55);
      text-transform: uppercase;
    }

    /* ── agent chips ──────────────────────────────────────────── */
    .agents-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    @keyframes idleBreath {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.02); opacity: 0.9; }
    }

    .agent-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      transition: border-color 0.3s, color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.25s, opacity 0.3s;
      animation: idleBreath 4s ease-in-out infinite;
    }

    .agent-chip:nth-child(1) { animation-delay: 0s; }
    .agent-chip:nth-child(2) { animation-delay: 1s; }
    .agent-chip:nth-child(3) { animation-delay: 2s; }
    .agent-chip:nth-child(4) { animation-delay: 3s; }

    .agent-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    /* considering */
    @keyframes chipGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.15); }
      50%       { box-shadow: 0 0 14px rgba(245,158,11,0.2), 0 0 0 0 transparent; }
    }

    .agent-chip.considering {
      border-color: rgba(245,158,11,0.28);
      color: rgba(245,158,11,0.65);
      background: rgba(245,158,11,0.05);
      animation: chipGlow 1.1s ease-in-out infinite;
    }

    .agent-chip.considering .dot {
      background: rgba(245,158,11,0.55);
      box-shadow: 0 0 7px rgba(245,158,11,0.5);
    }

    /* selected */
    .agent-chip.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      box-shadow: var(--accent-glow);
      transform: scale(1.07) translateY(-2px);
      animation: none;
    }

    .agent-chip.selected .dot {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    /* dimmed */
    .agent-chip.dimmed {
      opacity: 0.18;
      transform: scale(0.96);
      animation: none;
    }

    /* ── status bar ───────────────────────────────────────────── */
    .status-bar {
      width: 100%;
      max-width: 680px;
      background: rgba(245,158,11,0.05);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 8px;
      padding: 9px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(-10px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      pointer-events: none;
    }

    .status-bar.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .status-icon { font-size: 0.9rem; line-height: 1; }

    #status-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      flex: 1;
    }

    .status-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
      margin: 0 1.5px;
      animation: sdBounce 1.2s ease-in-out infinite;
    }

    .status-dots span:nth-child(2) { animation-delay: 0.2s; }
    .status-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes sdBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .status-bar.decided .status-dots { display: none; }

    /* ── chat container ───────────────────────────────────────── */
    .chat-container {
      width: 100%;
      max-width: 680px;
      background-color: var(--surface);
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 28px 28px;
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── messages ─────────────────────────────────────────────── */
    .messages {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 380px;
      max-height: 520px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 48px;
      text-align: center;
    }

    .empty-state svg { opacity: 0.15; color: var(--accent); }

    .empty-state .empty-title {
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .empty-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: rgba(245,158,11,0.35);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 6px;
      padding: 6px 14px;
      letter-spacing: 0.03em;
    }

    /* ── message bubbles ──────────────────────────────────────── */
    .message {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .message.user  { align-items: flex-end; }
    .message.agent { align-items: flex-start; }

    .bubble {
      max-width: 86%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--accent);
      color: #0C0800;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .agent-label {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 1px;
    }

    .agent-label .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.07em;
      color: var(--accent);
      border: 1px solid rgba(245,158,11,0.22);
      border-radius: 4px;
      padding: 2px 8px;
      background: rgba(245,158,11,0.07);
      text-transform: uppercase;
    }

    /* thinking dots */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.04em;
      padding: 4px 0;
    }

    .dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* typing cursor */
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      border-radius: 1px;
      animation: cursorBlink 0.75s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── input area ───────────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    textarea {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus {
      border-color: rgba(245,158,11,0.38);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.07);
    }

    #send {
      position: relative;
      background: var(--accent);
      color: #0C0800;
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      overflow: hidden;
    }

    #send:hover {
      background: #FBBF24;
      box-shadow: 0 0 16px rgba(245,158,11,0.45);
    }

    #send:active { transform: scale(0.92); }

    #send:disabled {
      background: rgba(245,158,11,0.2);
      cursor: not-allowed;
      box-shadow: none;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleOut 0.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleOut {
      to { transform: scale(3.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <header>
    <h1>Dispatch</h1>
    <p>Multi-agent support orchestration — watch the AI route your question in real time.</p>
  </header>

  <div class="dispatch-hub" id="dispatch-hub">
    <svg class="signal-svg" id="signal-svg" aria-hidden="true"></svg>

    <div class="orchestrator-node" id="orchestrator-node">
      <div class="orch-wrapper">
        <div class="orch-ring"></div>
        <div class="orch-ring"></div>
        <div class="orch-core">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </div>
      </div>
      <span class="orch-label">ORCHESTRATOR</span>
    </div>

    <div class="agents-bar">
      <div class="agent-chip" id="chip-product">
        <span class="dot"></span>Product agent
      </div>
      <div class="agent-chip" id="chip-shipping">
        <span class="dot"></span>Shipping agent
      </div>
      <div class="agent-chip" id="chip-refund">
        <span class="dot"></span>Refund agent
      </div>
      <div class="agent-chip" id="chip-custom">
        <span class="dot"></span>Custom data agent
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <span class="status-icon">⚡</span>
    <span id="status-text">ANALYZING QUERY</span>
    <div class="status-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p class="empty-title">Ask a question to get started.</p>
        <div class="empty-hint">Try: "Where is order ORD-1042?"</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Ask a support question..." maxlength="500"></textarea>
      <button id="send" title="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ── particle canvas ───────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('particle-canvas');
      const ctx    = canvas.getContext('2d');
      let nodes    = [];

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function init() {
        nodes = Array.from({ length: 32 }, () => ({
          x:  Math.random() * canvas.width,
          y:  Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.22,
          vy: (Math.random() - 0.5) * 0.22,
          r:  Math.random() * 1.3 + 0.4,
        }));
      }

      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const n of nodes) {
          n.x += n.vx;
          n.y += n.vy;
          if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
          if (n.y < 0 || n.y > canvas.height)  n.vy *= -1;
        }

        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx   = nodes[i].x - nodes[j].x;
            const dy   = nodes[i].y - nodes[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < 140) {
              const alpha = 0.05 * (1 - dist / 140);
              ctx.strokeStyle = `rgba(245,158,11,${alpha})`;
              ctx.lineWidth   = 0.5;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.stroke();
            }
          }
        }

        for (const n of nodes) {
          ctx.fillStyle = 'rgba(245,158,11,0.09)';
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(tick);
      }

      resize();
      init();
      tick();
      window.addEventListener('resize', () => { resize(); init(); });
    })();

    // ── refs ──────────────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const emptyEl    = document.getElementById('empty');
    const signalSvg  = document.getElementById('signal-svg');
    const statusBar  = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');

    const chips = {
      product:  document.getElementById('chip-product'),
      shipping: document.getElementById('chip-shipping'),
      refund:   document.getElementById('chip-refund'),
      custom:   document.getElementById('chip-custom'),
    };

    const agentLabels = {
      product:  'Product agent',
      shipping: 'Shipping agent',
      refund:   'Refund agent',
      custom:   'Custom data agent',
    };

    const pendingBubbles = {};

    // ── signal lines ──────────────────────────────────────────────
    function hubCenter(el) {
      const hub  = document.getElementById('dispatch-hub');
      const hr   = hub.getBoundingClientRect();
      const er   = el.getBoundingClientRect();
      return {
        x: er.left + er.width  / 2 - hr.left,
        y: er.top  + er.height / 2 - hr.top,
      };
    }

    function drawSignals(activeRoutes) {
      while (signalSvg.firstChild) signalSvg.removeChild(signalSvg.firstChild);

      const orchCore = document.querySelector('.orch-core');
      const origin   = hubCenter(orchCore);
      // start from bottom edge of core
      origin.y += 30;

      Object.entries(chips).forEach(([key, chipEl]) => {
        const target   = hubCenter(chipEl);
        const isActive = !activeRoutes || activeRoutes.includes(key);
        const cpY      = origin.y + (target.y - origin.y) * 0.4;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${origin.x} ${origin.y} Q ${origin.x} ${cpY} ${target.x} ${target.y}`);
        path.setAttribute('stroke',
          activeRoutes && !activeRoutes.includes(key)
            ? 'rgba(255,255,255,0.05)'
            : 'rgba(245,158,11,0.55)');
        path.setAttribute('stroke-width',
          activeRoutes && activeRoutes.includes(key) ? '1.5' : '0.7');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');

        signalSvg.appendChild(path);

        const len = path.getTotalLength();
        path.setAttribute('stroke-dasharray', len);
        path.setAttribute('stroke-dashoffset', len);
        path.style.transition = `stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1) ${isActive ? 0 : 0.06}s`;

        requestAnimationFrame(() => requestAnimationFrame(() => {
          path.setAttribute('stroke-dashoffset', '0');
        }));
      });
    }

    function clearSignals() {
      while (signalSvg.firstChild) signalSvg.removeChild(signalSvg.firstChild);
    }

    // ── status bar ────────────────────────────────────────────────
    function showStatus(text, decided) {
      statusText.textContent = text;
      statusBar.classList.toggle('decided', !!decided);
      statusBar.classList.add('visible');
    }

    function hideStatus() {
      statusBar.classList.remove('visible', 'decided');
    }

    // ── chip helpers ──────────────────────────────────────────────
    function resetChips() {
      Object.values(chips).forEach(el =>
        el.classList.remove('considering', 'selected', 'dimmed'));
      clearSignals();
      hideStatus();
    }

    function setChipsConsidering() {
      Object.values(chips).forEach(el => {
        el.classList.remove('selected', 'dimmed');
        el.classList.add('considering');
      });
      drawSignals(null);
      showStatus('ANALYZING QUERY');
    }

    function setChipsDecided(routes) {
      Object.entries(chips).forEach(([key, el]) => {
        el.classList.remove('considering');
        if (routes.includes(key)) {
          el.classList.add('selected');
          el.classList.remove('dimmed');
        } else {
          el.classList.add('dimmed');
          el.classList.remove('selected');
        }
      });
      drawSignals(routes);
      const names = routes.map(r => agentLabels[r] || r).join(' + ').toUpperCase();
      showStatus(`→ ${names}`, true);
    }

    // ── DOM helpers ───────────────────────────────────────────────
    function hideEmpty() {
      if (emptyEl) emptyEl.style.display = 'none';
    }

    function typeTextInto(el, text) {
      el.innerHTML = '<span class="cursor-blink"></span>';
      const cursor = el.querySelector('.cursor-blink');
      let i = 0;
      // speed: aim for ~2.5s total, min 10ms max 30ms per tick, 2 chars/tick
      const tickMs = Math.min(30, Math.max(10, Math.round(2500 / text.length)));
      const interval = setInterval(() => {
        if (i >= text.length) {
          clearInterval(interval);
          cursor.remove();
          messagesEl.scrollTop = messagesEl.scrollHeight;
          return;
        }
        cursor.insertAdjacentText('beforebegin', text.slice(i, i + 2));
        i += 2;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }, tickMs);
    }

    function appendMessage(role, text, agent) {
      hideEmpty();
      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'agent' && agent) {
        const label = document.createElement('div');
        label.className = 'agent-label';
        label.innerHTML = `<span class="badge">${agentLabels[agent] || agent}</span>`;
        div.appendChild(label);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function appendPendingBubble(agent) {
      hideEmpty();
      const div    = document.createElement('div');
      div.className = 'message agent';

      const label  = document.createElement('div');
      label.className = 'agent-label';
      label.innerHTML = `<span class="badge">${agentLabels[agent] || agent}</span>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

      div.appendChild(label);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function fillBubble(div, text, isError) {
      const bubble = div.querySelector('.bubble');
      if (!bubble) return;
      if (isError) {
        bubble.textContent = text;
        bubble.style.color = '#EF4444';
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }
      typeTextInto(bubble, text);
    }

    function showThinking(label) {
      const div = document.createElement('div');
      div.className = 'message agent';
      div.id = 'thinking';
      div.innerHTML = `<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span id="thinking-label">${label || 'Routing...'}</span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateThinking(label) {
      const el = document.getElementById('thinking-label');
      if (el) el.textContent = label;
    }

    function removeThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    // ── SSE dispatcher ────────────────────────────────────────────
    function handleSseBlock(block) {
      let eventName = 'message', dataLine = '';
      for (const line of block.split('\n')) {
        if (line.startsWith('event: ')) eventName = line.slice(7).trim();
        if (line.startsWith('data: '))  dataLine  = line.slice(6).trim();
      }
      if (!dataLine) return;
      let payload;
      try { payload = JSON.parse(dataLine); } catch { return; }
      dispatchEvent_(eventName, payload);
    }

    function dispatchEvent_(event, payload) {
      switch (event) {
        case 'routing':
          if (payload.status === 'thinking') {
            setChipsConsidering();
            updateThinking('Routing...');
          } else if (payload.status === 'decided') {
            setChipsDecided(payload.routes);
            const names = payload.routes.map(r => agentLabels[r] || r).join(', ');
            updateThinking(`Calling: ${names}...`);
          }
          break;
        case 'agent_start':
          pendingBubbles[payload.agent] = appendPendingBubble(payload.agent);
          break;
        case 'agent_answer':
          removeThinking();
          if (pendingBubbles[payload.agent]) {
            fillBubble(pendingBubbles[payload.agent], payload.answer, false);
            delete pendingBubbles[payload.agent];
          } else {
            appendMessage('agent', payload.answer, payload.agent);
          }
          break;
        case 'agent_error':
          if (pendingBubbles[payload.agent]) {
            fillBubble(pendingBubbles[payload.agent], payload.message, true);
            delete pendingBubbles[payload.agent];
          }
          break;
        case 'error':
          removeThinking();
          appendMessage('agent', payload.message, null);
          break;
        case 'done':
          removeThinking();
          break;
      }
    }

    // ── send + ripple ─────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener('click', (e) => {
      const rect   = sendBtn.getBoundingClientRect();
      const size   = Math.max(rect.width, rect.height);
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
      sendBtn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
      send();
    });

    async function send() {
      const question = inputEl.value.trim();
      if (!question) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      resetChips();
      appendMessage('user', question);
      showThinking('Routing...');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok || !res.body) {
          removeThinking();
          const data = await res.json().catch(() => ({}));
          appendMessage('agent', data.error || 'Something went wrong. Please try again.', null);
          return;
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() ?? '';
          for (const part of parts) {
            if (part.trim()) handleSseBlock(part);
          }
        }
      } catch {
        removeThinking();
        appendMessage('agent', 'Connection error. Please check the server is running.', null);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
