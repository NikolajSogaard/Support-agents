<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Agents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    header p {
      color: #6b7280;
      margin-top: 8px;
      font-size: 1rem;
    }

    .agents-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }

    .agent-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .agent-chip.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #2563eb;
      transform: scale(1.05);
    }

    .agent-chip.active .dot {
      background: #2563eb;
      box-shadow: 0 0 0 3px #bfdbfe;
    }

    .agent-chip .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      transition: background 0.2s, box-shadow 0.2s;
    }

    @keyframes chipPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.25); }
      50%       { box-shadow: 0 0 0 7px rgba(37, 99, 235, 0); }
    }

    .agent-chip.considering {
      border-color: #93c5fd;
      background: #f0f7ff;
      animation: chipPulse 1s ease-in-out infinite;
    }

    .agent-chip.considering .dot {
      background: #93c5fd;
    }

    .agent-chip.selected {
      border-color: #2563eb;
      background: #eff6ff;
      color: #2563eb;
      transform: scale(1.08);
      box-shadow: 0 0 0 3px #bfdbfe;
      animation: none;
    }

    .agent-chip.selected .dot {
      background: #2563eb;
      box-shadow: 0 0 0 3px #bfdbfe;
    }

    .agent-chip.dimmed {
      opacity: 0.35;
      animation: none;
    }

    .routing-label {
      font-size: 0.78rem;
      color: #6b7280;
      text-align: center;
      min-height: 22px;
      margin-top: -18px;
      margin-bottom: 10px;
      transition: opacity 0.3s;
    }

    .routing-label span {
      background: #eff6ff;
      color: #2563eb;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
      border: 1px solid #bfdbfe;
    }

    .chat-container {
      width: 100%;
      max-width: 680px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 380px;
      max-height: 520px;
      overflow-y: auto;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      gap: 10px;
      padding: 40px;
      text-align: center;
    }

    .empty-state svg { opacity: 0.4; }
    .empty-state p { font-size: 0.95rem; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message.user { align-items: flex-end; }
    .message.agent { align-items: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 4px;
    }

    .agent-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #2563eb;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
    }

    .agent-label .badge {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.7rem;
      text-transform: capitalize;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6b7280;
      font-size: 0.85rem;
      padding: 4px 0;
    }

    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-area {
      border-top: 1px solid #e5e7eb;
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #2563eb; }

    button#send {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    button#send:hover { background: #1d4ed8; }
    button#send:active { transform: scale(0.95); }
    button#send:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>NordGear Support</h1>
    <p>Ask anything — our AI routes your question to the right specialist.</p>
  </header>

  <div class="agents-bar">
    <div class="agent-chip" id="chip-product">
      <span class="dot"></span> Product agent
    </div>
    <div class="agent-chip" id="chip-shipping">
      <span class="dot"></span> Shipping agent
    </div>
    <div class="agent-chip" id="chip-refund">
      <span class="dot"></span> Refund agent
    </div>
    <div class="agent-chip" id="chip-custom">
      <span class="dot"></span> Custom data agent
    </div>
  </div>

  <div class="routing-label" id="routing-label"></div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Ask a question to get started.<br/>Try: "Where is order ORD-1042?" or "Can I return order ORD-1044?"</p>
      </div>
    </div>
    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Ask a support question..." maxlength="500"></textarea>
      <button id="send" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const emptyEl    = document.getElementById('empty');

    const chips = {
      product:  document.getElementById('chip-product'),
      shipping: document.getElementById('chip-shipping'),
      refund:   document.getElementById('chip-refund'),
      custom:   document.getElementById('chip-custom'),
    };

    const agentLabels = {
      product:  'Product agent',
      shipping: 'Shipping agent',
      refund:   'Refund agent',
      custom:   'Custom data agent',
    };

    // agentName → placeholder bubble element (set while agent is in-flight)
    const pendingBubbles = {};

    // ── chip helpers ──────────────────────────────────────────────────────
    function resetChips() {
      Object.values(chips).forEach(el =>
        el.classList.remove('active', 'considering', 'selected', 'dimmed'));
      const labelEl = document.getElementById('routing-label');
      if (labelEl) labelEl.innerHTML = '';
    }

    function setChipsConsidering() {
      Object.values(chips).forEach(el => {
        el.classList.remove('selected', 'dimmed', 'active');
        el.classList.add('considering');
      });
    }

    function setChipsDecided(routes) {
      Object.entries(chips).forEach(([key, el]) => {
        el.classList.remove('considering', 'active');
        if (routes.includes(key)) {
          el.classList.add('selected');
          el.classList.remove('dimmed');
        } else {
          el.classList.add('dimmed');
          el.classList.remove('selected');
        }
      });
      const names = routes.map(r => agentLabels[r] || r).join(', ');
      const labelEl = document.getElementById('routing-label');
      if (labelEl) labelEl.innerHTML = `Routed to: <span>${names}</span>`;
    }

    // ── DOM helpers ───────────────────────────────────────────────────────
    function hideEmpty() {
      if (emptyEl) emptyEl.style.display = 'none';
    }

    function appendMessage(role, text, agent) {
      hideEmpty();
      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'agent' && agent) {
        const label = document.createElement('div');
        label.className = 'agent-label';
        label.innerHTML = `<span class="badge">${agentLabels[agent] || agent}</span>`;
        div.appendChild(label);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function appendPendingBubble(agent) {
      hideEmpty();
      const div = document.createElement('div');
      div.className = 'message agent';

      const label = document.createElement('div');
      label.className = 'agent-label';
      label.innerHTML = `<span class="badge">${agentLabels[agent] || agent}</span>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

      div.appendChild(label);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function fillBubble(div, text, isError) {
      const bubble = div.querySelector('.bubble');
      if (bubble) {
        bubble.textContent = text;
        if (isError) bubble.style.color = '#dc2626';
      }
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showThinking(label) {
      const div = document.createElement('div');
      div.className = 'message agent';
      div.id = 'thinking';
      div.innerHTML = `<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span id="thinking-label">${label || 'Routing your question...'}</span></div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateThinking(label) {
      const el = document.getElementById('thinking-label');
      if (el) el.textContent = label;
    }

    function removeThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    // ── SSE dispatcher ────────────────────────────────────────────────────
    function handleSseBlock(block) {
      let eventName = 'message';
      let dataLine  = '';
      for (const line of block.split('\n')) {
        if (line.startsWith('event: ')) eventName = line.slice(7).trim();
        if (line.startsWith('data: '))  dataLine  = line.slice(6).trim();
      }
      if (!dataLine) return;
      let payload;
      try { payload = JSON.parse(dataLine); } catch { return; }
      dispatch(eventName, payload);
    }

    function dispatch(event, payload) {
      switch (event) {
        case 'routing':
          if (payload.status === 'thinking') {
            setChipsConsidering();
            updateThinking('Routing your question...');
          } else if (payload.status === 'decided') {
            setChipsDecided(payload.routes);
            const names = payload.routes.map(r => agentLabels[r] || r).join(', ');
            updateThinking(`Calling: ${names}...`);
          }
          break;

        case 'agent_start':
          pendingBubbles[payload.agent] = appendPendingBubble(payload.agent);
          break;

        case 'agent_answer':
          removeThinking();
          if (pendingBubbles[payload.agent]) {
            fillBubble(pendingBubbles[payload.agent], payload.answer, false);
            delete pendingBubbles[payload.agent];
          } else {
            appendMessage('agent', payload.answer, payload.agent);
          }
          break;

        case 'agent_error':
          if (pendingBubbles[payload.agent]) {
            fillBubble(pendingBubbles[payload.agent], payload.message, true);
            delete pendingBubbles[payload.agent];
          }
          break;

        case 'error':
          removeThinking();
          appendMessage('agent', payload.message, null);
          break;

        case 'done':
          removeThinking();
          break;
      }
    }

    // ── send ──────────────────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    async function send() {
      const question = inputEl.value.trim();
      if (!question) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      resetChips();
      appendMessage('user', question);
      showThinking('Routing your question...');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!res.ok || !res.body) {
          removeThinking();
          const data = await res.json().catch(() => ({}));
          appendMessage('agent', data.error || 'Something went wrong. Please try again.', null);
          return;
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() ?? '';
          for (const part of parts) {
            if (part.trim()) handleSseBlock(part);
          }
        }
      } catch {
        removeThinking();
        appendMessage('agent', 'Connection error. Please check the server is running.', null);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
